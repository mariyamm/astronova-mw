<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroNova Admin - Вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #5F667B;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #F3EFEA;
        }

        .login-container {
            background-color: #4F566B;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-container img {
            width: 150px;
            height: auto;
            margin-bottom: 15px;
        }

        .logo-container h1 {
            color: #E2A293;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .logo-container p {
            color: #F6D6D0;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #F3EFEA;
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #5F667B;
            border-radius: 8px;
            background-color: #F3EFEA;
            color: #4F566B;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #E2A293;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #E2A293;
            color: #4F566B;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background-color: #F6D6D0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(226, 162, 147, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            background-color: #d32f2f;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
            color: #E2A293;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <img src="https://cdn.shopify.com/s/files/1/0967/1707/8911/files/path256-3-fotor-20251216183219.png?v=1766004778" alt="AstroNova Logo">
            <h1>AstroNova Admin</h1>
            <p>Административен панел</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Потребителско име</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Парола</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-login">Вход</button>
            <div class="loading" id="loading">Зареждане...</div>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const loading = document.getElementById('loading');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Hide error message
            errorMessage.style.display = 'none';
            loading.style.display = 'block';

            try {
                // Create form data
                const formData = new FormData();
                formData.append('username', username);
                formData.append('password', password);

                // Send login request
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    // Store token in localStorage
                    localStorage.setItem('access_token', data.access_token);
                    
                    // Redirect to dashboard
                    window.location.href = '/admin/dashboard.html';
                } else {
                    // Show error message
                    errorMessage.textContent = data.detail || 'Грешка при вход';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                errorMessage.textContent = 'Грешка при свързване със сървъра';
                errorMessage.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
